    <script>
      (function() {
        var link = document.getElementById('dynamic-favicon');
        var updateFavicon = function(e) {
          link.href = e.matches ? '/favicon-dark-v5.png' : '/favicon-light-v5.png';
        };
        var mql = window.matchMedia('(prefers-color-scheme: dark)');
        mql.addEventListener('change', updateFavicon);
        updateFavicon(mql);
      })();
    </script>
